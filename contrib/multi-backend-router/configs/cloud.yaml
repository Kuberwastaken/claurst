  - model_name: together-qwen3
    litellm_params:
      model: together_ai/Qwen/Qwen3-235B-A22B-Instruct-2507-tput
      api_key: os.environ/TOGETHER_API_KEY

  - model_name: groq-scout
    litellm_params:
      model: groq/meta-llama/llama-4-scout-17b-16e-instruct
      api_key: os.environ/GROQ_API_KEY

litellm_settings:
  drop_params: true
  request_timeout: 1800
  set_verbose: false
  telemetry: false

general_settings:
  # No master_key = accept any API key (safe, 127.0.0.1 only)
